<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Lab Interpreter Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#f0f4ff; --bg2:#fff; --bg3:#f7f9ff; --card:#fff;
      --line:#dde3f5; --line2:#eaf0ff;
      --text:#1a2040; --text2:#2a3560;
      --dim:#7a88b8; --dim2:#a0aed0;
      --acc:#2952d0; --acc2:#e8eeff;
      --hi:#d63020; --hi2:#fff0ee;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: 'JetBrains Mono', monospace;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }
    header {
      padding: 15px 20px; background: var(--bg);
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; color: var(--text); }
    
    .tabs-nav {
      display: flex; background: var(--bg); padding: 0 10px; gap: 5px;
      border-bottom: 1px solid var(--line);
    }
    .tab-btn {
      flex: 1; border: none; background: none; padding: 12px 5px;
      font-family: inherit; font-size: 12px; font-weight: 600; color: var(--dim);
      cursor: pointer; position: relative; transition: 0.2s;
    }
    .tab-btn.active { color: var(--acc); }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
      height: 3px; background: var(--acc); border-radius: 10px 10px 0 0;
    }

    /* ألوان التبويبات المخصصة */
    .tab-btn[data-tab="plumbing"].active { color: #2e7d32; }
    .tab-btn[data-tab="plumbing"].active::after { background: #2e7d32; }
    .tab-btn[data-tab="electricity"].active { color: #f9a825; }
    .tab-btn[data-tab="electricity"].active::after { background: #f9a825; }
    .tab-btn[data-tab="plastering"].active { color: #1565c0; }
    .tab-btn[data-tab="plastering"].active::after { background: #1565c0; }

    main { flex: 1; overflow-y: auto; padding: 20px; }
    .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; }
    
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 11px; font-weight: 700; color: var(--dim); margin-bottom: 6px; text-transform: uppercase; }
    input, select {
      width: 100%; padding: 12px 15px; border-radius: 12px;
      border: 1px solid var(--line2); background: var(--bg3);
      font-family: inherit; font-size: 14px; color: var(--text); outline: none;
    }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; font-size: 10px; color: var(--dim2); padding: 10px 5px; text-transform: uppercase; }
    td { padding: 12px 5px; border-top: 1px solid var(--line2); font-size: 13px; }
    
    .btn-print {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      background: var(--text); color: #fff; font-family: inherit;
      font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

<header>
  <div class="brand">LAB PRO</div>
  <div style="font-size: 11px; font-weight: 700; color: var(--dim);">REPORT GENERATOR</div>
</header>

<div class="tabs-nav">
  <button class="tab-btn active" onclick="showTab('info')">INFO</button>
  <button class="tab-btn" data-tab="plumbing" onclick="showTab('plumbing')">PLUMBING</button>
  <button class="tab-btn" data-tab="electricity" onclick="showTab('electricity')">ELECTRIC</button>
  <button class="tab-btn" data-tab="plastering" onclick="showTab('plastering')">PLASTER</button>
</div>

<main id="main-content">
  <div id="info" class="tab-content active">
    <div class="card">
      <div class="input-group"><label>Patient Name</label><input type="text" id="patientName" placeholder="Full Name"></div>
      <div class="input-group"><label>Age</label><input type="text" id="patientAge"></div>
      <div class="input-group"><label>Sex</label><select id="patientSex"><option>Male</option><option>Female</option></select></div>
      <div class="input-group"><label>Patient ID</label><input type="text" id="patientID"></div>
    </div>
  </div>

  <div id="results-container">
    <div class="card">
      <table id="resultsTable">
        <thead>
          <tr>
            <th style="text-align:left">Test</th>
            <th style="text-align:right">Conc.</th>
            <th style="text-align:right">Excr.</th>
            <th>Unit</th>
            <th>Ref.</th>
            <th>Flag</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Calcium</td>
            <td><input type="number" step="0.01" oninput="checkRef(this, 8.5, 10.5)"></td>
            <td><input type="number" step="0.01"></td>
            <td>mg/dL</td>
            <td>8.5-10.5</td>
            <td class="flag-cell" style="text-align:center; font-weight:700;">-</td>
          </tr>
          </tbody>
      </table>
      <button class="btn-print" onclick="printReport()">PRINT REPORT</button>
    </div>
  </div>
</main>

<script>
  function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  function checkRef(input, min, max) {
    const val = parseFloat(input.value);
    const row = input.closest('tr');
    const flagCell = row.querySelector('.flag-cell');
    if (isNaN(val)) { flagCell.innerText = "-"; flagCell.style.color = "inherit"; return; }
    if (val < min) { flagCell.innerText = "L"; flagCell.style.color = "blue"; }
    else if (val > max) { flagCell.innerText = "H"; flagCell.style.color = "red"; }
    else { flagCell.innerText = "N"; flagCell.style.color = "green"; }
  }

  // الوظيفة المصلحة للطباعة التي تعالج العطل
  function printReport() {
    const pName = document.getElementById("patientName").value || "N/A";
    const pAge = document.getElementById("patientAge").value || "N/A";
    const pSex = document.getElementById("patientSex").value || "N/A";
    const pID = document.getElementById("patientID").value || "N/A";

    let rowsHtml = "";
    const rows = document.querySelectorAll("#resultsTable tbody tr");

    rows.forEach(row => {
      const test = row.cells[0].innerText;
      const conc = row.cells[1].querySelector("input").value;
      const excr = row.cells[2].querySelector("input").value;
      const unit = row.cells[3].innerText;
      const ref = row.cells[4].innerText;
      const flag = row.cells[5].innerText;
      const color = row.cells[5].style.color || "#1a2040";

      // إذا كان هناك أي قيمة مدخلة، أضفها للتقرير
      if (conc.trim() !== "" || excr.trim() !== "") {
        rowsHtml += `
          <tr>
            <td>${test}</td>
            <td style="text-align:right">${conc || "-"}</td>
            <td style="text-align:right">${excr || "-"}</td>
            <td>${unit}</td>
            <td>${ref}</td>
            <td style="text-align:center; font-weight:bold; color:${color}">${flag}</td>
          </tr>`;
      }
    });

    const win = window.open('', '_blank');
    win.document.write(`
      <html>
      <head>
        <title>Report - ${pName}</title>
        <style>
          body { font-family: sans-serif; padding: 30px; color: #1a2040; }
          .hdr { display: flex; justify-content: space-between; border-bottom: 2px solid #1a2040; padding-bottom: 10px; }
          .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; font-size: 14px; }
          table { width: 100%; border-collapse: collapse; }
          th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; font-size: 13px; }
          th { background: #f9f9f9; }
          .ftr { margin-top: 40px; border-top: 1px solid #eee; padding-top: 10px; font-size: 12px; display: flex; justify-content: space-between; }
        </style>
      </head>
      <body>
        <div class="hdr"><h2>LAB INTERPRETER PRO</h2><div>OFFICIAL REPORT</div></div>
        <div class="grid">
          <div><strong>Patient:</strong> ${pName}</div>
          <div><strong>ID:</strong> ${pID}</div>
          <div><strong>Age:</strong> ${pAge}</div>
          <div><strong>Sex:</strong> ${pSex}</div>
        </div>
        <table>
          <thead>
            <tr><th>Test</th><th style="text-align:right">Conc.</th><th style="text-align:right">Excr.</th><th>Unit</th><th>Ref. Range</th><th style="text-align:center">Flag</th></tr>
          </thead>
          <tbody>${rowsHtml || "<tr><td colspan='6' style='text-align:center'>No data entered</td></tr>"}</tbody>
        </table>
        <div class="ftr">
          <div><strong>Lab Technician:</strong> Saad Ali Saad Al-Qarni<br>فني المختبر: سعد علي سعد القرني</div>
          <div style="text-align:right">Date: ${new Date().toLocaleString()}</div>
        </div>
        <script>window.onload = function() { window.print(); window.close(); }<\/script>
      </body>
      </html>
    `);
    win.document.close();
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Lab"/>
  <meta name="theme-color" content="#07090f"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icons/icon-192.png"/>
  <title>Lab Interpreter</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #07090f;
      --bg2:     #09101e;
      --bg3:     #0c1120;
      --border:  #13203a;
      --border2: #18243a;
      --text:    #d0d4e8;
      --text2:   #c0c8e0;
      --muted:   #2a3a60;
      --muted2:  #1e3050;
      --blue:    #3d5fbd;
      --bluebtn: #162866;
      --bluehov: #2244cc;
      --high:    #f44336;
      --low:     #42a5f5;
      --ok:      #4caf50;
      --safe:    env(safe-area-inset-top, 0px);
      --safeb:   env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; overflow: hidden; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input { outline: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Layout ── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh;
      padding-top: calc(var(--safe) + 12px);
      padding-bottom: calc(var(--safeb) + 0px);
    }
    .topbar {
      flex-shrink: 0;
      padding: 0 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text2); letter-spacing: .3px; }
    .topbar-sub   { font-size: 8px; color: var(--muted); letter-spacing: 2px; margin-bottom: 6px; }
    .steps { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .sdot  { width: 22px; height: 3px; border-radius: 2px; transition: background .2s; }
    .sline { width: 12px; height: 1px; background: var(--border); }
    .slabel { font-size: 8px; color: var(--muted); letter-spacing: 1.5px; margin-right: 8px; }

    .scroll-area {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      -webkit-overflow-scrolling: touch;
    }
    .bottom-bar {
      flex-shrink: 0;
      padding: 10px 14px calc(var(--safeb) + 10px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end;
      background: var(--bg);
    }

    /* ── Cards / rows ── */
    .gc { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .gh { background: #0e1830; padding: 7px 12px; font-size: 9px; letter-spacing: 2px; color: var(--blue); text-transform: uppercase; }
    .ri { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #0c1525; gap: 8px; }
    .ri:last-child { border-bottom: none; }

    /* ── Inputs ── */
    .pi {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
      border-radius: 5px; padding: 8px 10px; font-family: inherit; font-size: 13px;
      width: 100%; transition: border-color .12s;
    }
    .pi:focus { border-color: var(--blue); }
    .ti {
      background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
      border-radius: 4px; padding: 6px 8px; font-family: inherit; font-size: 13px;
      width: 100px; transition: border-color .12s; text-align: left; direction: ltr;
    }
    .ti:focus { border-color: var(--blue); }
    .ti.high   { border-color: #b71c1c; background: #140404; }
    .ti.low    { border-color: #0d47a1; background: #02080f; }
    .ti.normal { border-color: #1b5e20; background: #030d06; }

    /* ── Buttons ── */
    .btn { border: none; cursor: pointer; border-radius: 5px; font-family: inherit; font-size: 12px; padding: 9px 18px; letter-spacing: .5px; transition: all .12s; -webkit-user-select: none; }
    .btn-p  { background: var(--bluebtn); color: #6b92ff; border: 1px solid var(--bluehov); }
    .btn-p:active  { background: var(--bluehov); }
    .btn-g  { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-g:active  { border-color: var(--blue); color: #6b92ff; }
    .btn-pr { background: #0a2210; color: var(--ok); border: 1px solid #2e7d32; }
    .btn-pr:active { background: #1b5e20; }
    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .sx { padding: 7px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px; border: 1px solid var(--border); transition: all .12s; }
    .sx.on  { background: var(--bluebtn); color: #6b92ff; border-color: var(--bluehov); }
    .sx:not(.on) { background: transparent; color: var(--muted); }

    /* ── Result tags / bars ── */
    .tag { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 3px; letter-spacing: 1px; width: 38px; text-align: center; flex-shrink: 0; }
    .bar-bg { height: 3px; background: #0e1830; border-radius: 2px; flex: 1; }
    .bar-fg { height: 100%; border-radius: 2px; transition: width .25s; }

    /* ── Summary boxes ── */
    .count-row { display: flex; gap: 7px; margin-bottom: 12px; }
    .cbox { flex: 1; background: var(--bg2); border-radius: 6px; padding: 8px 4px; text-align: center; }
    .cnum { font-size: 20px; font-weight: 700; line-height: 1; }
    .clbl { font-size: 8px; letter-spacing: 1px; margin-top: 3px; opacity: .8; }

    /* ── Patient strip ── */
    .pstrip {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 7px;
      padding: 9px 12px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .pname { font-size: 14px; font-weight: 600; color: var(--text2); }
    .pmeta { font-size: 9px; color: var(--muted); margin-top: 3px; }

    /* ── Misc ── */
    .field-label { font-size: 9px; color: var(--muted); margin-bottom: 4px; letter-spacing: 1px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }
    .test-name { font-size: 12px; color: var(--text2); font-weight: 500; }
    .ref-range { font-size: 9px; color: var(--muted2); margin-top: 1px; direction: ltr; text-align: left; }
    .abn-header { font-size: 9px; letter-spacing: 2px; color: #b71c1c; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-sub">LAB RESULT INTERPRETER</div>
    <div class="topbar-title">تفسير النتائج المخبرية</div>
    <div class="steps" id="steps"></div>
  </div>
  <div class="scroll-area" id="main"></div>
  <div class="bottom-bar" id="footer"></div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const TESTS = {
  GLUC:        { label:"Glucose",           unit:"mmol/L",  ref:{all:[3.9,6.1]} },
  UREA:        { label:"Urea",              unit:"mmol/L",  ref:{all:[2.5,7.8]} },
  CREA:        { label:"Creatinine",        unit:"µmol/L",  ref:{male:[62,106],female:[44,80]} },
  URICA:       { label:"Uric Acid",         unit:"µmol/L",  ref:{male:[202,416],female:[143,340]} },
  ALT:         { label:"ALT",               unit:"U/L",     ref:{male:[7,56],female:[7,35]} },
  AST:         { label:"AST",               unit:"U/L",     ref:{male:[10,40],female:[10,35]} },
  GGT:         { label:"GGT",               unit:"U/L",     ref:{male:[8,61],female:[5,36]} },
  ALP:         { label:"ALP",               unit:"U/L",     ref:{male:[40,129],female:[35,104]} },
  LDH:         { label:"LDH",               unit:"U/L",     ref:{all:[135,225]} },
  CK:          { label:"CK",                unit:"U/L",     ref:{male:[39,308],female:[26,192]} },
  BILT:        { label:"Bilirubin Total",   unit:"µmol/L",  ref:{all:[3.4,20.5]} },
  BILD:        { label:"Bilirubin Direct",  unit:"µmol/L",  ref:{all:[0,5.1]} },
  TP:          { label:"Total Protein",     unit:"g/L",     ref:{all:[64,83]} },
  ALB:         { label:"Albumin",           unit:"g/L",     ref:{male:[40,51],female:[35,52]} },
  AMYL:        { label:"Amylase",           unit:"U/L",     ref:{all:[28,100]} },
  LIP:         { label:"Lipase",            unit:"U/L",     ref:{all:[13,60]} },
  CHOL:        { label:"Cholesterol",       unit:"mmol/L",  ref:{all:[0,5.17]} },
  LDLC:        { label:"LDL-C",            unit:"mmol/L",  ref:{all:[0,3.36]} },
  HDLC:        { label:"HDL-C",            unit:"mmol/L",  ref:{male:[1.0,1.6],female:[1.2,1.9]} },
  TRIG:        { label:"Triglycerides",     unit:"mmol/L",  ref:{all:[0,1.7]} },
  Na:          { label:"Sodium",            unit:"mmol/L",  ref:{all:[136,145]} },
  K:           { label:"Potassium",         unit:"mmol/L",  ref:{all:[3.5,5.1]} },
  Cl:          { label:"Chloride",          unit:"mmol/L",  ref:{all:[98,107]} },
  Ca:          { label:"Calcium",           unit:"mmol/L",  ref:{all:[2.15,2.55]} },
  Mg:          { label:"Magnesium",         unit:"mmol/L",  ref:{all:[0.74,1.03]} },
  Phos:        { label:"Phosphorus",        unit:"mmol/L",  ref:{all:[0.87,1.45]} },
  Iron:        { label:"Iron",              unit:"µmol/L",  ref:{male:[11.6,31.3],female:[6.6,26.0]} },
  TSH:         { label:"TSH",               unit:"mIU/L",   ref:{all:[0.27,4.2]} },
  FT3:         { label:"Free T3",           unit:"pmol/L",  ref:{all:[3.1,6.8]} },
  FT4:         { label:"Free T4",           unit:"pmol/L",  ref:{all:[12,22]} },
  Testosterone:{ label:"Testosterone",      unit:"nmol/L",  ref:{male:[9.9,27.8],female:[0.29,1.67]} },
  DHEAS:       { label:"DHEA-S",            unit:"µmol/L",  ref:{male:[4.34,12.2],female:[2.68,9.23]} },
  Cortisol:    { label:"Cortisol (AM)",     unit:"nmol/L",  ref:{all:[138,690]} },
  Insulin:     { label:"Insulin",           unit:"µIU/mL",  ref:{all:[2.6,24.9]} },
  CPeptide:    { label:"C-Peptide",         unit:"nmol/L",  ref:{all:[0.37,1.47]} },
  VitD:        { label:"Vitamin D (25-OH)", unit:"nmol/L",  ref:{all:[50,250]} },
  B12:         { label:"Vitamin B12",       unit:"pmol/L",  ref:{all:[133,675]} },
  Ferritin:    { label:"Ferritin",          unit:"µg/L",    ref:{male:[30,400],female:[13,150]} },
};

const GROUPS = [
  { label:"Basic Chemistry",    keys:["GLUC","UREA","CREA","URICA"] },
  { label:"Liver Panel",        keys:["ALT","AST","GGT","ALP","LDH","CK","BILT","BILD","TP","ALB","AMYL","LIP"] },
  { label:"Lipid Panel",        keys:["CHOL","LDLC","HDLC","TRIG"] },
  { label:"Electrolytes",       keys:["Na","K","Cl","Ca","Mg","Phos","Iron"] },
  { label:"Hormones",           keys:["TSH","FT3","FT4","Testosterone","DHEAS","Cortisol","Insulin","CPeptide"] },
  { label:"Vitamins & Markers", keys:["VitD","B12","Ferritin"] },
];

// ── State ─────────────────────────────────────────────────────────────────
let step    = "patient";
let sex     = "male";
let patient = { name:"", age:"", date: new Date().toISOString().slice(0,10) };
let values  = {};

// ── Helpers ───────────────────────────────────────────────────────────────
function getRef(test, s) {
  const r = test.ref;
  if (r.all) return r.all;
  return s === "male" ? (r.male||null) : (r.female||null);
}
function interp(v, ref) {
  if (!ref || isNaN(v)) return "unknown";
  if (v < ref[0]) return "low";
  if (v > ref[1]) return "high";
  return "normal";
}
function barPct(v, ref) {
  if (!ref) return 50;
  return Math.min(Math.max(((v-ref[0])/(ref[1]-ref[0]))*100, 0), 100);
}
function getResults() {
  return Object.entries(values)
    .filter(([,v]) => v !== "" && v !== undefined && !isNaN(parseFloat(v)))
    .map(([k,v]) => {
      const test = TESTS[k], ref = getRef(test, sex), val = parseFloat(v);
      return { k, test, val, ref, status: interp(val, ref) };
    });
}
const C  = { high:"#f44336", low:"#42a5f5", normal:"#4caf50", unknown:"#555" };
const BG = { high:"#1c0606", low:"#030d18", normal:"#061208", unknown:"#0a0a0a" };

// ── Steps indicator ───────────────────────────────────────────────────────
function renderSteps() {
  const order = ["patient","entry","results"];
  const labels = { patient:"PATIENT", entry:"RESULTS", results:"REPORT" };
  const idx = order.indexOf(step);
  const el = document.getElementById("steps");
  el.innerHTML = order.map((s,i) => {
    const done = idx > i;
    const active = idx === i;
    const bg = active ? "#3d5fbd" : done ? "#1b5e20" : "#13203a";
    return `<div class="sdot" style="background:${bg}"></div>${i<2?'<div class="sline"></div>':''}`;
  }).join("") + `<div class="slabel">${labels[step]}</div>`;
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  renderSteps();
  if (step === "patient") renderPatient();
  else if (step === "entry") renderEntry();
  else renderResults();
}

// ── Step 1: Patient ───────────────────────────────────────────────────────
function renderPatient() {
  document.getElementById("main").innerHTML = `
    <div class="gc">
      <div class="gh">Patient Information</div>
      <div style="padding:14px 12px">
        <div class="grid2" style="margin-bottom:12px">
          <div>
            <div class="field-label">PATIENT NAME</div>
            <input class="pi" id="f-name" placeholder="Full name" value="${patient.name}" autocomplete="off"/>
          </div>
          <div>
            <div class="field-label">AGE</div>
            <input class="pi" id="f-age" type="number" placeholder="Years" value="${patient.age}"/>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <div class="field-label">DATE</div>
          <input class="pi" id="f-date" type="date" value="${patient.date}" style="width:auto"/>
        </div>
        <div>
          <div class="field-label" style="margin-bottom:7px">SEX</div>
          <div style="display:flex;gap:8px">
            <button class="sx${sex==='male'?' on':''}" onclick="setSex('male')">Male</button>
            <button class="sx${sex==='female'?' on':''}" onclick="setSex('female')">Female</button>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById("footer").innerHTML = `
    <button class="btn btn-p" onclick="goEntry()">Enter Results ▶</button>`;

  ["f-name","f-age","f-date"].forEach(id => {
    document.getElementById(id).addEventListener("input", e => {
      const map = {"f-name":"name","f-age":"age","f-date":"date"};
      patient[map[id]] = e.target.value;
    });
  });
}

function setSex(s) { sex = s; render(); }

function goEntry() {
  patient.name = document.getElementById("f-name")?.value || patient.name;
  patient.age  = document.getElementById("f-age")?.value  || patient.age;
  patient.date = document.getElementById("f-date")?.value || patient.date;
  step = "entry"; render();
}

// ── Step 2: Entry ─────────────────────────────────────────────────────────
function renderEntry() {
  let html = "";
  GROUPS.forEach(group => {
    html += `<div class="gc"><div class="gh">${group.label}</div>`;
    group.keys.forEach(key => {
      const test = TESTS[key];
      const ref  = getRef(test, sex);
      const v    = values[key];
      const st   = (v !== "" && v !== undefined) ? interp(parseFloat(v), ref) : "";
      const cls  = st ? ` ${st}` : "";
      html += `
        <div class="ri">
          <div style="flex:1;min-width:0">
            <div class="test-name">${test.label}</div>
            <div class="ref-range">${ref ? ref[0]+" – "+ref[1]+" "+test.unit : "— "+test.unit}</div>
          </div>
          <input type="number" class="ti${cls}" data-key="${key}"
            placeholder="${test.unit}" value="${v||""}" step="any"
            inputmode="decimal"/>
        </div>`;
    });
    html += "</div>";
  });
  document.getElementById("main").innerHTML = html;
  document.getElementById("footer").innerHTML = `
    <button class="btn btn-g btn-sm" onclick="step='patient';render()">◀ Back</button>
    <button class="btn btn-g btn-sm" onclick="clearAll()">Clear</button>
    <button class="btn btn-p" onclick="goResults()">Analyze ▶</button>`;

  document.querySelectorAll(".ti[data-key]").forEach(inp => {
    inp.addEventListener("input", e => {
      const key = e.target.dataset.key;
      values[key] = e.target.value;
      const test = TESTS[key];
      const ref  = getRef(test, sex);
      const st   = e.target.value !== "" ? interp(parseFloat(e.target.value), ref) : "";
      e.target.className = "ti" + (st ? " "+st : "");
    });
  });
}

function clearAll() { values = {}; renderEntry(); }

function goResults() {
  document.querySelectorAll(".ti[data-key]").forEach(inp => {
    if (inp.value !== "") values[inp.dataset.key] = inp.value;
  });
  step = "results"; render();
}

// ── Step 3: Results ───────────────────────────────────────────────────────
function renderResults() {
  const results = getResults();
  const high   = results.filter(r => r.status === "high").length;
  const low    = results.filter(r => r.status === "low").length;
  const normal = results.filter(r => r.status === "normal").length;
  const abnormals = results.filter(r => r.status !== "normal" && r.status !== "unknown");

  let html = `
    <div class="pstrip">
      <div>
        <div class="pname">${patient.name||"—"}</div>
        <div class="pmeta">${patient.age?patient.age+" yrs · ":""}${sex==="male"?"Male":"Female"} · ${patient.date}</div>
      </div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-g btn-sm" onclick="step='entry';render()">◀ Edit</button>
        <button class="btn btn-pr btn-sm" onclick="doPrint()">⎙ Print</button>
      </div>
    </div>

    <div class="count-row">
      <div class="cbox" style="border:1px solid #f4433618">
        <div class="cnum" style="color:#f44336">${high}</div>
        <div class="clbl" style="color:#f44336">HIGH</div>
      </div>
      <div class="cbox" style="border:1px solid #42a5f518">
        <div class="cnum" style="color:#42a5f5">${low}</div>
        <div class="clbl" style="color:#42a5f5">LOW</div>
      </div>
      <div class="cbox" style="border:1px solid #4caf5018">
        <div class="cnum" style="color:#4caf50">${normal}</div>
        <div class="clbl" style="color:#4caf50">NORMAL</div>
      </div>
      <div class="cbox" style="border:1px solid #13203a">
        <div class="cnum" style="color:#5c6880">${results.length}</div>
        <div class="clbl" style="color:#5c6880">TOTAL</div>
      </div>
    </div>`;

  if (abnormals.length) {
    html += `<div class="gc" style="margin-bottom:10px">
      <div class="gh abn-header">⚠ ABNORMAL RESULTS</div>`;
    abnormals.forEach(({test,val,ref,status}) => {
      const c = C[status];
      const p = barPct(val, ref);
      html += `
        <div class="ri">
          <div style="min-width:0;width:105px;flex-shrink:0">
            <div class="test-name" style="font-size:11px">${test.label}</div>
            <div class="ref-range">${ref?ref[0]+"–"+ref[1]:"—"}</div>
          </div>
          <div style="text-align:left;flex-shrink:0;width:60px;direction:ltr">
            <span style="font-size:14px;font-weight:700;color:${c}">${val}</span>
            <div style="font-size:8px;color:#1e3050">${test.unit}</div>
          </div>
          <div class="bar-bg"><div class="bar-fg" style="width:${p}%;background:${c}"></div></div>
          <div class="tag" style="background:${BG[status]};color:${c};border:1px solid ${c}30">
            ${status==="high"?"↑HI":"↓LO"}
          </div>
        </div>`;
    });
    html += "</div>";
  }

  GROUPS.forEach(group => {
    const gr = results.filter(r => group.keys.includes(r.k));
    if (!gr.length) return;
    html += `<div class="gc"><div class="gh">${group.label}</div>`;
    gr.forEach(({test,val,ref,status}) => {
      const c = C[status];
      const p = barPct(val, ref);
      html += `
        <div class="ri">
          <div style="flex:1;min-width:0">
            <div class="test-name">${test.label}</div>
            <div class="ref-range">${ref?ref[0]+" – "+ref[1]:"—"}</div>
          </div>
          <div style="text-align:left;flex-shrink:0;direction:ltr;margin-left:6px">
            <span style="font-size:14px;font-weight:700;color:${c}">${val}</span>
            <div style="font-size:8px;color:#1e3050">${test.unit}</div>
          </div>
          <div class="bar-bg" style="width:56px"><div class="bar-fg" style="width:${p}%;background:${c}"></div></div>
          <div class="tag" style="background:${BG[status]};color:${c};border:1px solid ${c}28">
            ${status==="high"?"↑HI":status==="low"?"↓LO":"NL"}
          </div>
        </div>`;
    });
    html += "</div>";
  });

  html += `<div style="height:16px"></div>`;
  document.getElementById("main").innerHTML = html;
  document.getElementById("footer").innerHTML = "";
}

// ── Print ─────────────────────────────────────────────────────────────────
function doPrint() {
  const results = getResults();
  const high   = results.filter(r=>r.status==="high").length;
  const low    = results.filter(r=>r.status==="low").length;
  const normal = results.filter(r=>r.status==="normal").length;

  const groupRows = GROUPS.map(group => {
    const gr = results.filter(r => group.keys.includes(r.k));
    if (!gr.length) return "";
    return `<tr><td colspan="5" style="background:#111;color:#fff;padding:5px 8px;font-size:9px;letter-spacing:2px;text-transform:uppercase">${group.label}</td></tr>`
      + gr.map(({test,val,ref,status}) => {
          const flag = status==="high"?"H":status==="low"?"L":"";
          const col  = status==="high"?"#c62828":status==="low"?"#1565c0":"#333";
          return `<tr>
            <td>${test.label}</td>
            <td style="font-weight:600;color:${col}">${val}</td>
            <td>${test.unit}</td>
            <td>${ref?ref[0]+" – "+ref[1]:"—"}</td>
            <td style="font-weight:700;color:${col};text-align:center">${flag}</td>
          </tr>`;
        }).join("");
  }).join("");

  const w = window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Lab Report — ${patient.name||"Patient"}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'IBM Plex Mono',monospace;color:#111;background:#fff;padding:28px;font-size:11px}
    .top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:14px}
    .lab{font-size:15px;font-weight:600;letter-spacing:3px}
    .sub{font-size:8px;color:#888;letter-spacing:2px;margin-top:3px}
    .pinfo{display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;background:#f7f7f7;padding:10px 12px;border-radius:5px;margin-bottom:12px}
    .prow{font-size:10px}.plabel{color:#888;margin-right:4px}.pval{font-weight:600}
    .sumrow{display:flex;gap:8px;margin-bottom:12px}
    .sbox{flex:1;border:1px solid #ddd;border-radius:4px;padding:7px;text-align:center}
    .snum{font-size:18px;font-weight:700}
    table{width:100%;border-collapse:collapse}
    td{padding:5px 8px;border-bottom:1px solid #eee;font-size:10px;vertical-align:middle}
    .footer{margin-top:16px;border-top:1px solid #ddd;padding-top:8px;font-size:8px;color:#aaa;display:flex;justify-content:space-between}
    @media print{body{padding:14px}}
  </style></head><body>
  <div class="top">
    <div><div class="lab">LABORATORY REPORT</div><div class="sub">Biochemistry Results</div></div>
    <div style="text-align:right;font-size:10px;color:#555">${patient.date}</div>
  </div>
  <div class="pinfo">
    <div class="prow"><span class="plabel">Name:</span><span class="pval">${patient.name||"—"}</span></div>
    <div class="prow"><span class="plabel">Age:</span><span class="pval">${patient.age?patient.age+" years":"—"}</span></div>
    <div class="prow"><span class="plabel">Sex:</span><span class="pval">${sex==="male"?"Male":"Female"}</span></div>
    <div class="prow"><span class="plabel">Date:</span><span class="pval">${patient.date}</span></div>
  </div>
  <div class="sumrow">
    <div class="sbox"><div class="snum" style="color:#c62828">${high}</div><div style="font-size:8px;color:#c62828;letter-spacing:1px">HIGH</div></div>
    <div class="sbox"><div class="snum" style="color:#1565c0">${low}</div><div style="font-size:8px;color:#1565c0;letter-spacing:1px">LOW</div></div>
    <div class="sbox"><div class="snum" style="color:#2e7d32">${normal}</div><div style="font-size:8px;color:#2e7d32;letter-spacing:1px">NORMAL</div></div>
    <div class="sbox"><div class="snum">${results.length}</div><div style="font-size:8px;color:#555;letter-spacing:1px">TOTAL</div></div>
  </div>
  <table>
    <tr style="background:#f0f0f0;font-size:9px;color:#666">
      <th style="text-align:left;padding:5px 8px">Test</th>
      <th style="text-align:left;padding:5px 8px">Result</th>
      <th style="text-align:left;padding:5px 8px">Unit</th>
      <th style="text-align:left;padding:5px 8px">Reference Range</th>
      <th style="text-align:center;padding:5px 8px">Flag</th>
    </tr>
    ${groupRows}
  </table>
  <div class="footer">
    <span>Reference ranges are sex-specific where applicable.</span>
    <span>Printed: ${new Date().toLocaleString()}</span>
  </div>
  </body></html>`);
  w.document.close();
  w.focus();
  setTimeout(()=>w.print(), 400);
}

// ── Boot ──────────────────────────────────────────────────────────────────
render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
</script>
</body>
</html>
